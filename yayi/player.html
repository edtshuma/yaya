<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yayi Music Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #181818;
    color: #fff;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  .player-wrap {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 960px;
    margin: 0 auto;
    width: 100%;
    padding: 24px 32px;
  }

  .track-list {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 16px;
  }

  .track-list::-webkit-scrollbar { width: 4px; }
  .track-list::-webkit-scrollbar-track { background: transparent; }
  .track-list::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

  .track {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .2s;
    gap: 16px;
  }

  .track:hover { background: rgba(255,255,255,.06); }
  .track.active { background: rgba(240,176,0,.1); }

  .track-num {
    width: 24px;
    text-align: center;
    font-size: 14px;
    color: #888;
    flex-shrink: 0;
  }

  .track.active .track-num,
  .track:hover .track-num { color: #f0b000; }

  .track-icon {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .track-icon svg { fill: #888; width: 18px; height: 18px; }
  .track.active .track-icon svg { fill: #f0b000; }
  .track:hover .track-icon svg { fill: #fff; }

  .bars {
    display: none;
    gap: 2px;
    align-items: flex-end;
    height: 16px;
  }

  .bars span {
    display: block;
    width: 3px;
    background: #f0b000;
    border-radius: 1px;
    animation: eq 0.6s ease-in-out infinite alternate;
  }

  .bars span:nth-child(1) { height: 6px; animation-delay: 0s; }
  .bars span:nth-child(2) { height: 12px; animation-delay: 0.2s; }
  .bars span:nth-child(3) { height: 8px; animation-delay: 0.4s; }

  @keyframes eq {
    0% { height: 4px; }
    100% { height: 16px; }
  }

  .track.active.playing .bars { display: flex; }
  .track.active.playing .play-icon { display: none; }
  .track.active:not(.playing) .bars { display: none; }

  .track-info { flex: 1; min-width: 0; }

  .track-title {
    font-size: 16px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-artist {
    font-size: 13px;
    color: #888;
    margin-top: 2px;
  }

  .track-duration {
    font-size: 13px;
    color: #888;
    flex-shrink: 0;
  }

  .controls {
    background: #111;
    border-radius: 12px;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .now-playing {
    text-align: center;
    font-size: 13px;
    color: #aaa;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .now-playing strong { color: #fff; font-weight: 500; }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .time {
    font-size: 12px;
    color: #888;
    min-width: 36px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: #333;
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }

  .progress-bar:hover { height: 6px; }

  .progress-fill {
    height: 100%;
    background: #f0b000;
    border-radius: 2px;
    width: 0%;
    position: relative;
    transition: width 0.1s linear;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px;
    height: 10px;
    background: #fff;
    border-radius: 50%;
    opacity: 0;
    transition: opacity .15s;
  }

  .progress-bar:hover .progress-fill::after { opacity: 1; }

  .btn-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .15s;
  }

  .ctrl-btn:hover { transform: scale(1.1); }
  .ctrl-btn:active { transform: scale(0.95); }
  .ctrl-btn svg { fill: #ccc; }
  .ctrl-btn:hover svg { fill: #fff; }
  .ctrl-btn.play-pause svg { fill: #fff; }
  .ctrl-btn.play-pause { background: #f0b000; border-radius: 50%; padding: 10px; }
  .ctrl-btn.play-pause:hover { background: #ffca28; }
  .ctrl-btn.play-pause svg { fill: #000; width: 22px; height: 22px; }

  .volume-row {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    position: absolute;
    right: 24px;
    bottom: 24px;
  }

  .volume-bar {
    width: 80px;
    height: 4px;
    background: #333;
    border-radius: 2px;
    cursor: pointer;
  }

  .volume-fill {
    height: 100%;
    background: #888;
    border-radius: 2px;
    width: 80%;
  }

  .controls { position: relative; }
</style>
</head>
<body>

<div class="player-wrap">
  <div class="track-list" id="trackList"></div>
  <div class="controls">
    <div class="now-playing" id="nowPlaying">Select a track to play</div>
    <div class="progress-row">
      <span class="time" id="curTime">0:00</span>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="time" id="totalTime">0:00</span>
    </div>
    <div class="btn-row">
      <button class="ctrl-btn" id="prevBtn" aria-label="Previous">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn play-pause" id="playBtn" aria-label="Play">
        <svg id="iconPlay" width="22" height="22" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" width="22" height="22" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
      </button>
      <button class="ctrl-btn" id="nextBtn" aria-label="Next">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm10-12v12h2V6z"/></svg>
      </button>
    </div>
    <div class="volume-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#888"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      <div class="volume-bar" id="volumeBar">
        <div class="volume-fill" id="volumeFill"></div>
      </div>
    </div>
  </div>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
const tracks = [
  { title: 'Higher', artist: 'Yayi', src: 'audio/higher.mp3' },
  { title: 'Ndokuda', artist: 'Yayi', src: 'audio/ndokuda.mp3' },
  { title: 'Ruvarashe', artist: 'Yayi', src: 'audio/ruvarashe.mp3' }
];

const audio = document.getElementById('audio');
const trackList = document.getElementById('trackList');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const curTime = document.getElementById('curTime');
const totalTime = document.getElementById('totalTime');
const nowPlaying = document.getElementById('nowPlaying');
const iconPlay = document.getElementById('iconPlay');
const iconPause = document.getElementById('iconPause');
const volumeBar = document.getElementById('volumeBar');
const volumeFill = document.getElementById('volumeFill');

let currentIndex = -1;
let isPlaying = false;

function fmt(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function renderTracks() {
  trackList.innerHTML = tracks.map((t, i) => `
    <div class="track${i === currentIndex ? ' active' : ''}${i === currentIndex && isPlaying ? ' playing' : ''}" data-index="${i}">
      <span class="track-num">${i + 1}</span>
      <div class="track-icon">
        <svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <div class="bars"><span></span><span></span><span></span></div>
      </div>
      <div class="track-info">
        <div class="track-title">${t.title}</div>
        <div class="track-artist">${t.artist}</div>
      </div>
      <span class="track-duration" id="dur-${i}">--:--</span>
    </div>
  `).join('');

  trackList.querySelectorAll('.track').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.index);
      if (idx === currentIndex) {
        togglePlay();
      } else {
        loadTrack(idx);
        audio.play();
        isPlaying = true;
        updatePlayIcon();
        renderTracks();
      }
    });
  });
}

function loadTrack(idx) {
  currentIndex = idx;
  const t = tracks[idx];
  audio.src = t.src;
  nowPlaying.innerHTML = 'Now Playing: <strong>' + t.title + '</strong> &mdash; ' + t.artist;
}

function togglePlay() {
  if (currentIndex === -1) {
    loadTrack(0);
  }
  if (isPlaying) {
    audio.pause();
  } else {
    audio.play();
  }
  isPlaying = !isPlaying;
  updatePlayIcon();
  renderTracks();
}

function updatePlayIcon() {
  iconPlay.style.display = isPlaying ? 'none' : 'block';
  iconPause.style.display = isPlaying ? 'block' : 'none';
}

playBtn.addEventListener('click', togglePlay);

prevBtn.addEventListener('click', () => {
  if (currentIndex <= 0) return;
  loadTrack(currentIndex - 1);
  audio.play();
  isPlaying = true;
  updatePlayIcon();
  renderTracks();
});

nextBtn.addEventListener('click', () => {
  if (currentIndex >= tracks.length - 1) return;
  loadTrack(currentIndex + 1);
  audio.play();
  isPlaying = true;
  updatePlayIcon();
  renderTracks();
});

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressFill.style.width = pct + '%';
  curTime.textContent = fmt(audio.currentTime);
  totalTime.textContent = fmt(audio.duration);
});

audio.addEventListener('ended', () => {
  if (currentIndex < tracks.length - 1) {
    loadTrack(currentIndex + 1);
    audio.play();
    renderTracks();
  } else {
    isPlaying = false;
    updatePlayIcon();
    renderTracks();
  }
});

audio.addEventListener('pause', () => {
  isPlaying = false;
  updatePlayIcon();
  renderTracks();
});

audio.addEventListener('play', () => {
  isPlaying = true;
  updatePlayIcon();
  renderTracks();
});

progressBar.addEventListener('click', (e) => {
  if (!audio.duration) return;
  const rect = progressBar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

volumeBar.addEventListener('click', (e) => {
  const rect = volumeBar.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.volume = pct;
  volumeFill.style.width = (pct * 100) + '%';
});

audio.volume = 0.8;
volumeFill.style.width = '80%';

renderTracks();
</script>
</body>
</html>
